<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fidget Prsten 3D</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0b1f;
    color: white;
    text-align: center;
}

header {
    padding: 60px 20px;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    color: #c084fc;
}

.product {
    background: #1a132f;
    padding: 40px;
    border-radius: 20px;
    max-width: 450px;
    margin: 40px auto;
    box-shadow: 0 0 40px rgba(192, 132, 252, 0.2);
}

.old-price {
    text-decoration: line-through;
    color: #aaa;
    font-size: 1.2em;
}

.new-price {
    font-size: 2.5em;
    color: #c084fc;
    margin: 10px 0;
    font-weight: bold;
}

.discount {
    background: #c084fc;
    color: #0f0b1f;
    display: inline-block;
    padding: 5px 15px;
    border-radius: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}

button {
    background: #c084fc;
    color: #0f0b1f;
    border: none;
    padding: 15px 40px;
    font-size: 1.1em;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #a855f7;
}

footer {
    margin-top: 60px;
    padding: 20px;
    font-size: 0.8em;
    opacity: 0.6;
}
</style>
</head>

<body>

<header>
    <h1>3D Fidget Prsten</h1>
    <p>Otáčej ho kolem prstu. Uklidni mysl. Stylově.</p>
</header>

<section class="product">
    <div class="discount">🔥 MEGA SLEVA</div>
    <h2>Spin Ring 3D</h2>
    <p>Minimalistický fidget prsten z 3D tiskárny s otočným středem. Pomáhá proti stresu a nudě.</p>

    <div class="old-price">99 Kč</div>
    <div class="new-price">19 Kč</div>

    <button onclick="alert('Demo verze – zde bude platební brána')">
        Koupit nyní
    </button>
</section>

<footer>
    © 2026 Goblin DEV | Všechna práva vyhrazena
</footer>

</body>
</html>
